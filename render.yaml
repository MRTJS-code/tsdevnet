services:
  - type: web
    name: tsdevnet-web
    env: node
    plan: starter
    buildCommand: "npm install && npm run build && npm run prisma:generate"
    startCommand: "npm run start"
    envVars:
      - key: APP_ENV
        value: prod
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: tsdevnet-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_SECURE
        value: "true"
      - key: TURNSTILE_SITE_KEY
        value: "replace-me"
      - key: TURNSTILE_SECRET_KEY
        value: "replace-me"
      - key: SMTP_HOST
        value: "replace-me"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: "replace-me"
      - key: SMTP_PASS
        value: "replace-me"
      - key: SMTP_FROM_EMAIL
        value: noreply@example.com
      - key: SMTP_FROM_NAME
        value: "Tony Smith"
      - key: OWNER_EMAIL
        value: owner@example.com
      - key: ADMIN_PASSWORD
        value: change-me
      - key: DEV_MAILBOX
        value: console
      - key: PUBLIC_BASE_URL
        value: https://your-app.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        value: "replace-me"
      - key: OWNER_TELEGRAM_CHAT_ID
        value: "replace-me"
      - key: APP_URL
        value: https://your-app.onrender.com

databases:
  - name: tsdevnet-db
    plan: starter
